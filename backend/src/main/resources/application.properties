# Secrets: use OS env vars, or a single repo-root ".env" (gitignored) loaded at startup — see .env.example
spring.datasource.url=jdbc:postgresql://localhost:5432/aimoderation
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:your_database_password}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# ── JWT / refresh token security ──────────────────────────────
# Must be at least 64 bytes. Generate one with: openssl rand -base64 64
jwt.secret=${JWT_SECRET:your_jwt_secret_change_this_to_a_secure_value_at_least_64_characters_long}
jwt.access.ttl-ms=${JWT_ACCESS_TTL_MS:900000}
jwt.refresh.ttl-days=${JWT_REFRESH_TTL_DAYS:14}
jwt.issuer=${JWT_ISSUER:ai-moderation}
jwt.audience=${JWT_AUDIENCE:ai-moderation-app}
jwt.clock-skew-seconds=30

# Account lockout policy
security.lockout.max-attempts=${SECURITY_LOCKOUT_MAX_ATTEMPTS:5}
security.lockout.duration-minutes=${SECURITY_LOCKOUT_DURATION_MINUTES:15}

# CORS — explicit list (credentials forbid '*')
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:5173,http://localhost:8080}

# Word Filter Configuration
filter.toxic-words.path=filters/toxic-words.txt
filter.negative-indicators.path=filters/negative-indicators.txt
filter.positive-words.path=filters/positive-words.txt
filter.sensitive-subjects.path=filters/sensitive-subjects.txt

# Image Moderation Configuration
moderation.image.skin-threshold=0.4
moderation.image.min-size=100
moderation.image.max-size=10485760

# Spring multipart file upload limits (must match moderation.image.max-size)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Hugging Face AI Configuration (Free tier: 300 requests/hour)
# Get your free API token at: https://huggingface.co/settings/tokens
huggingface.api.token=${HUGGINGFACE_API_TOKEN:}
huggingface.api.enabled=true

# Groq — free API key (fast Llama / Mixtral chat). https://console.groq.com/keys
groq.api.key=${GROQ_API_KEY:}
chat.groq.model=${GROQ_CHAT_MODEL:llama-3.1-8b-instant}

# ============================================================
# DEFAULT APPLICATION SETTINGS
# ============================================================

# Default moderation settings
app.defaults.moderation.threshold=0.7
app.defaults.moderation.active-model=ensemble
app.defaults.moderation.auto-approve-positive=true
app.defaults.moderation.auto-reject-high-confidence=true
app.defaults.moderation.auto-reject-threshold=0.85

# Default AI Chat settings
app.defaults.chat.enabled=true
app.defaults.chat.max-message-length=2000
app.defaults.chat.rate-limit-per-minute=30

# AI Chat - Free model configuration
# Providers: groq (recommended if GROQ_API_KEY set), huggingface, opennlp, combined
chat.default-provider=combined
chat.huggingface.model=microsoft/DialoGPT-medium
chat.huggingface.fallback-model=facebook/blenderbot-400M-distill
chat.opennlp.enabled=true

# Default notification settings
app.defaults.notifications.email-on-flagged=false
app.defaults.notifications.dashboard-alerts=true

# Default content settings
app.defaults.content.max-comment-length=1000
app.defaults.content.allow-anonymous=false
app.defaults.content.require-moderation-for-new-users=true
app.defaults.content.new-user-threshold-posts=5
